<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="sky" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#1a1448" />
      <stop offset="100%" stop-color="#070b1f" />
    </radialGradient>
    <radialGradient id="moon" cx="36%" cy="32%" r="80%">
      <stop offset="0%" stop-color="#fffdf3" />
      <stop offset="42%" stop-color="#fbeebf" />
      <stop offset="72%" stop-color="#f0cf86" />
      <stop offset="100%" stop-color="#d9ad57" />
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.2" result="b" />
      <feMerge>
        <feMergeNode in="b" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- night sky -->
  <rect width="64" height="64" rx="14" fill="url(#sky)" />

  <!-- twinkling stars -->
  <circle cx="14" cy="16" r="1.2" fill="#cdd6ff" opacity="0.9" />
  <circle cx="50" cy="14" r="1" fill="#cdd6ff" opacity="0.7" />
  <circle cx="52" cy="40" r="1.4" fill="#a78bfa" opacity="0.85" />
  <circle cx="12" cy="44" r="1" fill="#cdd6ff" opacity="0.6" />

  <!-- the moon -->
  <g filter="url(#glow)">
    <circle cx="30" cy="32" r="16" fill="url(#moon)" />
    <!-- soft craters -->
    <circle cx="24" cy="27" r="2.4" fill="#caa45f" opacity="0.35" />
    <circle cx="35" cy="38" r="3" fill="#caa45f" opacity="0.32" />
    <circle cx="33" cy="24" r="1.6" fill="#caa45f" opacity="0.3" />
  </g>

  <!-- a little love, to the moon and back -->
  <path d="M48 44c0-2 1.6-3.4 3.4-3.4 1.1 0 2 .6 2.6 1.5.6-.9 1.5-1.5 2.6-1.5C58.4 40.6 60 42 60 44c0 2.6-3.4 4.8-6 6.6-2.6-1.8-6-4-6-6.6z" fill="#f6a5c0" />
</svg>
